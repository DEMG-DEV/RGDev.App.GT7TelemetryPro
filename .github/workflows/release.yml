name: Build Multiplatform Executables

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller GT7TelemetryPro.spec

    - name: Rename executable (Windows)
      if: runner.os == 'Windows'
      run: |
        mv dist/GT7TelemetryPro dist/GT7TelemetryPro-Windows.exe

    - name: Zip Mac App
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r GT7TelemetryPro-Mac.zip GT7TelemetryPro.app

    - name: Rename executable (Linux)
      if: runner.os == 'Linux'
      run: |
        mv dist/GT7TelemetryPro dist/GT7TelemetryPro-Linux

    - name: Upload Release Asset (Windows)
      if: runner.os == 'Windows'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/GT7TelemetryPro-Windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset (Mac)
      if: runner.os == 'macOS'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/GT7TelemetryPro-Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset (Linux)
      if: runner.os == 'Linux'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/GT7TelemetryPro-Linux
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
